<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">Ana Sayfa</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Hakkımda</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">CV</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>

                    <li class="nav-item"><a class="nav-link" href="login.html">Giriş</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5"  id="contactApp" style="max-width: 600px;">
        <h2>İletişim Formu</h2>
        <hr>

        <div id="vueHatalar"><ul v-if="hatalar.length > 0" style="color:red;"><li v-for="h in hatalar">{{ h }}</li></ul></div>
        <div id="hataMesaji" style="color:red; display:none; margin-bottom:10px;"></div>

        <form id="contactForm" method="POST" action="php/form-isle.php">

            <div class="mb-3">
                <label>Ad Soyad</label><br>
                <input type="text" id="adSoyad" name="adSoyad" class="form-control">
            </div>

            <div class="mb-3">
                <label>E-posta</label><br>
                <input type="mail" id="eposta" name="eposta" class="form-control">
            </div>

            <div class="mb-3">
                <label>Telefon</label><br>
                <input type="phone" id="telefon" name="telefon" class="form-control">
            </div>

            <div class="mb-3">
                <label>Konu</label><br>
                <select id="konu" name="konu" class="form-select">
                    <option value="">Seçiniz</option>
                    <option value="isbirligi">İş Birliği</option>
                    <option value="proje">Proje Teklifi</option>
                    <option value="bilgi">Bilgi Alma</option>
                    <option value="diger">Diğer</option>
                </select>
            </div>

            <div class="mb-3">
                <label>İletişim Yöntemi</label><br>
                <input type="radio" name="iletisimYontemi" value="eposta"> E-posta &nbsp;
                <input type="radio" name="iletisimYontemi" value="telefon"> Telefon &nbsp;
                <input type="radio" name="iletisimYontemi" value="farketmez" checked> Fark Etmez
            </div>

            <div class="mb-3">
                <label>İlgilendiğiniz Konular</label><br>
                <input type="checkbox" name="ilgi[]" value="BCI"> BCI &nbsp;
                <input type="checkbox" name="ilgi[]" value="Web"> Web Geliştirme &nbsp;
                <input type="checkbox" name="ilgi[]" value="AI"> Yapay Zeka &nbsp;
                <input type="checkbox" name="ilgi[]" value="Diger"> Diğer
            </div>

            <div class="mb-3">
                <label>Mesaj</label><br>
                <textarea id="mesaj" name="mesaj" class="form-control" rows="4"></textarea>
            </div>


            <button type="button" class="btn btn-dark" onclick="formKontrol()">Gönder (Vanilla JS)</button>
            <!--TODO: Vue.js ile de kontrol eklenecek-->
            <button type="button" class="btn btn-success ms-2" id="vueGonderBtn">Gönder (Vue JS)</button>
                            

        </form>
    </div>

    <footer class="mt-5">
        <p>&copy; 2026 Esma Nur Savcı - Tüm hakları saklıdır.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/form-kontrol.js"></script>

</body>
</html>
